# ===================================================
# 🐌 CHALLENGE B — Pipeline CI/CD CHƯA TỐI ƯU
# ===================================================
# Pipeline này chạy nhưng RẤT CHẬM (~5 phút)
# Nhiệm vụ: Tối ưu để chạy nhanh hơn!
# ===================================================

name: Build & Deploy (UNOPTIMIZED VERSION)

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Test riêng
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test

  # Job 2: Build Docker image riêng (phải đợi test xong)
  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository }}:latest .

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository }}:latest
